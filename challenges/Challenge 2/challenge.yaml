title: Challenge 2
points: 300
difficulty: Medium
description: |
 A set of images has been extracted from a suspect's device. The images vary in quality, and some may have been altered or degraded.
 Your task is to analyse all available evidence, including visual details, metadata, and any versioning artefacts. <br><br>
 The primary objective is to determine the original text displayed on the bench in Image 1. This image appears to have been deliberately edited, and you must reconstruct the missing wording as accurately as possible using evidence from other pieces of evidence provided.<br><br>
