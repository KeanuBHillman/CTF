<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GIC CTF - Join</title>
  <!-- FONT -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/join.css') }}">
</head>
<body>
  <div class="join-container">
    <h1>Join a Team</h1>

    <div class="form-group">
      <input type="text" id="teamname" placeholder="TEAM NAME" />
    </div>

    <div class="form-group">
      <input type="text" id="snumber" placeholder="YOUR sNUMBER" />
    </div>
    <div class="response-box" id="response-box" style="display: none;">
      <span class="response-text" id="response-text"></span>
    </div>
    <button id="join-btn">Join Team</button>

    <p class="alt-link">
    or <a href="/" class="join-link">CREATE</a> a team
    </p>
  </div>


  <script src="{{ url_for('static', filename='js/join.js') }}"></script>
</body>
</html>
